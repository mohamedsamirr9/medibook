<section id="specialties" class="py-5">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="fw-bold">Our Medical Specialties</h2>
      <p class="text-muted">Providing world-class medical care across various fields</p>
    </div>
    <div class="row g-4">
      @for (spec of ['Cardiology', 'Pediatrics', 'Dermatology', 'Neurology']; track spec) {
        <div class="col-md-3 text-center">
          <div class="card h-100 border-0 shadow-sm p-4 hover-effect">
            <div class="fs-1 text-primary mb-3"><i class="bi bi-heart-pulse"></i></div>
            <h5 class="fw-bold">{{ spec }}</h5>
            <p class="small text-muted">Expert care for your specialized needs.</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
